      description: 'Este método permite redirigir al usuario a una pantalla de pago en la cual se le solicitarán los datos
        de su método de pago, el cual puede ser una tarjeta o un APM (método de pago alternativo). El token solicitado es
        el que se devuelve al <a href="#operation/generate-payment-order">generar una orden de pago</a>.


        Alternativamente, si se ha indicado el UUID de un checkout en el momento de generar la orden de pago, este método
        redirigirá el usuario al checkout para que seleccione qué método de pago quiere utilizar para pagar, y se le guiará
        hasta que el proceso de pago finalice.'
      x-description-i18n:
        eng: 'This method allows the user to be redirected to a payment screen where they will be prompted for their payment
          method, which can be a card or an APM (alternative payment method). The requested token is the one that is returned
          when <a href="#operation/generate-payment-order">generating a payment order</a>.


          Alternatively, if the UUID of a checkout has been indicated at the time of generating the payment order, this method
          will redirect the user to the checkout to select which payment method they want to use to pay, and will be guided
          until the payment process is completed.'
      x-summary-i18n:
        eng: Redirection
