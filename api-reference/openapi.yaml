  /customer/{customer_ext_id}/cards:
    get:
      operationId: get-customer-cards
      tags:
      - Tarjetas
      - Cards
      parameters:
      - $ref: '#/paths/~1/get/parameters/0'
      - name: customer_ext_id
        in: path
        required: true
        example: 123fd2
        schema:
          type: string
        description: ID externo otorgado por el comercio para identificar de forma única a un usuario.
        x-description-i18n:
          eng: External ID provided by the merchant to uniquely identify a customer.
      - name: status
        in: query
        required: false
        example: VALIDATED
        schema:
          type: string
        description: 'Especifica qué tarjetas se obtendrán. Admite dos posibles valores:


          - `VALIDATED` - Sólo devolverá aquellas tarjetas que se validaron correctamente cuando se guardaron o que se han
          podido utilizar en un pago correcto. Este es el valor por defecto.


          - `ALL` - Devolverá todas las tarjetas, tanto las validadas por el banco como las no validadas.'
        x-description-i18n:
          eng: 'Selects which cards will be returned. Two values are allowed:


            - `VALIDATED` - Only validated cards will be returned. Validated cards are those that were checked against bank
            service when user stored them or those that haven been used in a successful payment. This is the value by default.


            - `ALL` - All customer cards will be returned, both validated and unvalidated.'
      - name: unique
        in: query
        required: false
        example: 'false'
        schema:
          type: string
        description: 'Cuando se realiza una operación en Paylands, se asocia a una tarjeta del usuario. Si se utiliza esta
          tarjeta en otra operación, se crea otra entrada en el sistema. A la hora de obtener las tarjetas, este parámetro
          indica si se necesita obtenerlas todas con repetición (si se han usado en más de un pago) o sin repetición. Obtener
          las repetidas es útil para saber cuantas veces se ha usado una tarjeta. Sin embargo, si lo que se necesita es mostrarlas
          en un desplegable al usuario, se recomienda obtenerlas sin repetición. Admite dos posibles valores booleanos:


          - `true` - Sólo devolverá una ocurrencia por tarjeta.


          - `false` - Devolverá una tarjeta por pago. Si una tarjeta se ha usado en N pagos, aparecerá N veces en el json
          de respuesta. Este es el valor por defecto.'
        x-description-i18n:
          eng: 'When a payment is done within Paylands, it is associated to a customer card. If this card is used in another
            payment, another entry for this card is created. When fetching cards, the unique parameter decides whether repeated
