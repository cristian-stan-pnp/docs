          \n  },\n  body: JSON.stringify({\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\"\
          ,\n  \"amount\": 100,\n  \"description\": \"Order's description\",\n  \"customer_ext_id\": \"12345678A\",\n  \"\
          additional\": \"Additional info\",\n  \"url_post\": \"https://mysite.com/payment/result\",\n  \"reference\": \"\
          XXX1234ABC\"\n})\n});\n\nconst data = await response.json();\nconsole.log(data);"
      - lang: php
        label: PHP
        source: "<?php\n$ch = curl_init(\"https://api.paylands.com/v1/sandbox/posms/preauth\");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER,\
