info:
  version: 1.0.0
  title: Documentación de Paylands
  contact:
    name: Alguna pregunta? Contacta con nosotros aquí
    email: soporte@paylands.com
  x-logo:
    url: https://paylands-web-assets.s3.eu-west-1.amazonaws.com/logos/documentation-paylands-logo.png
    backgroundColor: '#FFFFFF'
    altText: Referencia API Paylands
servers:
- url: https://api.paylands.com/v1/sandbox
  description: Sandbox environment
- url: https://api.paylands.com/v1
  description: Production environment
security: []
tags:
- name: Autenticación
  description: 'Cuando uses la presente API deberás autenticar las llamadas mediante tu API Key en cada petición. Tu API Key
    conlleva muchos privilegios por lo que asegúrate de mantenerla en secreto. No compartas tu API Key ni la expongas nunca
    en el código del lado del cliente de cualquier sitio web público.


    La autenticación de la API se realiza mediante HTTP Basic Auth. Provee tu API Key como valor para el campo username (nombre
    de usuario). No es necesario proveer valor para el campo password (contraseña). Si se setea la cabecera Basic Auth manualmente,
    la API Key debe ir codificada en base64.


    Si necesita autenticar via bearer auth (como por ejemplo, para una petición cross-origin), usa el modificador -H "Authorization:
    Bearer <API Key>" en lugar de -u <API Key>:.


    Todas las peticiones a la API deben realizarse sobre HTTPS. Las peticiones realizadas sobre HTTP serán denegadas; así
    como las peticiones sin autenticar.'
- name: API Keys
  description: ''
- name: Campañas MoTo
  description: ''
- name: Operaciones en lote
  description: Mediante este endpoint se puede enviar un CSV al servidor conteniendo varias operaciones que serán ejecutadas
    en un proceso batch. Este CSV debe contener una línea de cabecera con el nombre de los campos. La segunda fila y siguientes
    contendrán toda la información de las diferentes operaciones. Los campos dentro de cada fila deben estar separados por
    una coma (,).
