  description: Paylands ofrece la posibilidad de crear comercios via api para aquellos comercios que sean partners.
- name: Servicios
  description: Paylands ofrece la posibilidad de crear servicios via api para aquellos comercios que sean partners.
- name: Terminales
  description: ''
- name: Clientes
  description: ''
- name: Card Present
  description: 'En el ámbito de los pagos electrónicos, el término "Card Present" se refiere a las transacciones en las que
    la tarjeta de pago física se encuentra presente en el momento de la transacción. Este tipo de pagos se realizan típicamente
    a través de un punto de venta (POS) físico, donde la tarjeta se desliza, inserta (en caso de tarjetas con chip) o se acerca
    (en el caso de tarjetas contactless o NFC) al dispositivo.


    En esta sección se describen todos los endpoints disponibles en Paylands para poder ejecutar operaciones desde dispositivos
    físicos. Estos endpoints siempre devolverán la respuesta de forma síncrona.'
- name: Subscripciones
  description: 'Paylands ofrece la posibilidad de realizar pagos recurrentes mediante suscripciones. Para ello es necesario
    registrar el producto que se está ofreciendo - por ejemplo, el acceso a un servicio de streaming. Hecho esto pueden registrarse
    uno o más planes para poder acceder a este producto - por ejemplo, una cuota de 10€/mes y otra de 100€/año.


    Para registrar las subscripciones sugerimos elaborar una carta de pago personalizada donde el cliente pueda seleccionar
    el plan que desee y la tarjeta que será cobrada. Una vez se cumpla el plazo establecido, el cliente recibirá un cargo
    en su tarjeta y el comercio recibirá una notificación con la información del cargo efectuado y si éste ha sido exitoso
    o no. Todas estas operaciones se realizarán a través de la API de Paylands.


    Los planes son flexibles, pudiéndose cobrar diariamente, semanalmente, mensualmente o anualmente. También es posible que
    el cobro sea cada varios días, semanas o meses. La primera cuota puede retrasarse varios días o semanas para que los clientes
    puedan cancelar su suscripción antes de que se realice el primer cobro. Una vez un usuario se ha registrado puede conocerse
    el día en el cual se realizará el próximo cobro, y el estado de su suscripción - pendiente de pago, pagada o cancelada.'
- name: POSMS
  description: 'Paylands ofrece la posibilidad de realizar pagos físicos mediante datáfonos inteligentes. Para utilizar este
    servicio, es necesarío que desde soporte se le registre en la plataforma y se le configuren los dispositivos necesarios
    con las credenciales del servicio de Credorax que vaya a ser usado en cada uno de ellos. Una vez tenga los datáfonos inteligentes,
    puede comenzar a procesar pagos a través de ellos.


    Existen dos métodos de integración para POSMS.  - El primero es mediante la integración API, que permite a su aplicación
    comunicarse directamente con el servicio Sentinel de Paylands para procesar pagos a través de dispositivos físicos. Este
    enfoque es perfecto para negocios que desean integrar capacidades de pago sin depender de una aplicación móvil existente.
    - El segundo es mediante la integración APP2APP, que permite a su aplicación móvil comunicarse directamente con el servicio
    Sentinel de Paylands para procesar pagos a través de dispositivos físicos. Este enfoque es perfecto para negocios con
    aplicaciones móviles existentes que desean integrar capacidades de pago sin implementar toda la lógica de comunicación
    de bajo nivel con el dispositivo. '
- name: POSMS - API
  description: ''
- name: POSMS - APP2APP
  description: ''
- name: UNNAMED
  description: Quizá debamos excluir estos endpoints de aquí.
- name: Listas de seguridad
  description: ''
