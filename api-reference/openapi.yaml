      summary: Enviar pre-autorización
      description: Este endpoint permite enviar una orden con operativa DEFERRED al dispositivo elegido.
      x-description-i18n:
        eng: This endpoint allows the merchant to send an order with the DEFERRED operative to the chosen physical device.
      x-summary-i18n:
