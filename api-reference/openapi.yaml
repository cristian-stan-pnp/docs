      summary: Suscribir a un cliente
      description: "Suscribe a un cliente a un plan, dado el ID externo del plan y el cliente, entre otros. Si el parámetro\
        \ `trial_available` del plan es `false`, se realiza un cobro inmediatamente tras suscribir al cliente.\n\nSi alguno\
        \ de los parámetros (UUID de servicio o tarjeta, por ejemplo) es incorrecto la subscripción se registrará pero el\
        \ pago no podrá realizarse. En este caso el `status` será `FAILED_NOTIFICATION`. Un ejemplo de la notificación enviada\
        \ al `notification_url` del Producto es el siguiente:\n\n~~~\n{\n    \"payment_id\": \"5dfa00a4229c1a127749ae9e\"\
        ,\n    \"subscription\": \"5dfa00a4229c1a127749ae9d\",\n    \"plan\": \"plan_external_id\",\n    \"product\": \"product_external_id\"\
        ,\n    \"customer\": \"customer_external_id\",\n    \"company\": \"FF255421-F4B7-47E9-9816-949F5F03DE6F\",\n    \"\
        status\": \"FAILED_NOTIFICATION\",\n    \"payment_date\": \"2019-12-18T10:34:12.640Z\",\n    \"payment_number\": 1,\n\
        \    \"attempt\": 1,\n    \"amount\": 1,\n    \"currency\": \"978\"\n}\n~~~\n\n![sub_diag_seq_1](https://paylands-web-assets.s3-eu-west-1.amazonaws.com/docs/subscripciones_diag_seq_subscripcion_fallida.png\
        \ \"Registro de subscripción fallido\")\n\nSi todos los parámetros son correctos, el pago se realizará y Paylands\
        \ enviará la notificación habitual a la `post_url` indicada en la Subscripción. También se enviará una notificación\
        \ a la `notification_url` del Producto. Un ejemplo de esta notificación se detalla en la segunda respuesta de ejemplo\
        \ a este endpoint.\n\n![sub_diag_seq_2](https://paylands-web-assets.s3-eu-west-1.amazonaws.com/docs/subscripciones_diag_seq_subscripcion_exitosa.png\
        \ \"Registro de subscripción exitoso\")"
      x-description-i18n:
        eng: "This endpoint subscribes a customer to the specified plan, given plan's external ID and customer's ID, amon\
          \ other fields. If `trial_available` field within the plan is `false`, an instant charge is carried out after subscribing\
          \ the customer.\nIf any of the fields (service UUID or card UUID, for example) is incorrect, subscription will be\
          \ registered but charged won't be able to be made. In this case, the `status` field will be `FAILED_NOTIFICATION`.\
          \ An example of this notification that would be sent to the product's `notification_url` would be the following\
          \ one:\n\n~~~\n{\n    \"payment_id\": \"5dfa00a4229c1a127749ae9e\",\n    \"subscription\": \"5dfa00a4229c1a127749ae9d\"\
          ,\n    \"plan\": \"plan_external_id\",\n    \"product\": \"product_external_id\",\n    \"customer\": \"customer_external_id\"\
          ,\n    \"company\": \"FF255421-F4B7-47E9-9816-949F5F03DE6F\",\n    \"status\": \"FAILED_NOTIFICATION\",\n    \"\
          payment_date\": \"2019-12-18T10:34:12.640Z\",\n    \"payment_number\": 1,\n    \"attempt\": 1,\n    \"amount\":\
          \ 1,\n    \"currency\": \"978\"\n}\n~~~\n\n![sub_diag_seq_1](https://paylands-web-assets.s3-eu-west-1.amazonaws.com/docs/subscripciones_diag_seq_subscripcion_fallida.png\
          \ \"Registro de subscripción fallido\")\n\nIf all parameters are correct, charge will be made and Paylands will\
          \ send the expected notification to the subscription's `post_url`. It will also be sent a notification to the product's\
          \ `notification_url`. An example of this notification can be seen in the second response to the following endpoint.\n\
          ![sub_diag_seq_2](https://paylands-web-assets.s3-eu-west-1.amazonaws.com/docs/subscripciones_diag_seq_subscripcion_exitosa.png\
          \ \"Registro de subscripción exitoso\")"
