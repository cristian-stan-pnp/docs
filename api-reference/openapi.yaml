          description: OK
      summary: Enviar pago
      description: Este endpoint permite enviar una orden con operativa AUTORIZACIÓN al dispositivo elegido.
      x-description-i18n:
        eng: This endpoint allows the merchant to send an order with the AUTHORIZATION operation to the chosen physical device.
      x-summary-i18n:
        eng: Send payment
      x-codeSamples:
      - lang: bash
        label: cURL
        source: "curl --request POST \\\n  --url https://api.paylands.com/v1/sandbox/posms/payment \\\n  --header 'Authorization:\
          \ Basic <base64(API_KEY:)>' \\\n  --header 'Content-Type: application/json' \\\n  --data '{\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\",\n  \"amount\": 100,\n  \"description\"\
          : \"Order's description\",\n  \"customer_ext_id\": \"12345678A\",\n  \"additional\": \"Additional info\",\n  \"\
          url_post\": \"https://mysite.com/payment/result\",\n  \"reference\": \"XXX1234ABC\"\n}'"
      - lang: python
        label: Python
        source: "import requests\n\nurl = \"https://api.paylands.com/v1/sandbox/posms/payment\"\nheaders = {\n    \"Authorization\"\
          : \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\n}\npayload = {\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\",\n  \"amount\": 100,\n  \"description\"\
          : \"Order's description\",\n  \"customer_ext_id\": \"12345678A\",\n  \"additional\": \"Additional info\",\n  \"\
          url_post\": \"https://mysite.com/payment/result\",\n  \"reference\": \"XXX1234ABC\"\n}\n\nresponse = requests.post(url,\
          \ json=payload, headers=headers)\nprint(response.json())"
      - lang: javascript
        label: Node.js
        source: "const response = await fetch(\"https://api.paylands.com/v1/sandbox/posms/payment\", {\n  method: \"POST\"\
          ,\n  headers: {\n    \"Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\
          \n  },\n  body: JSON.stringify({\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\"\
          ,\n  \"amount\": 100,\n  \"description\": \"Order's description\",\n  \"customer_ext_id\": \"12345678A\",\n  \"\
          additional\": \"Additional info\",\n  \"url_post\": \"https://mysite.com/payment/result\",\n  \"reference\": \"\
          XXX1234ABC\"\n})\n});\n\nconst data = await response.json();\nconsole.log(data);"
      - lang: php
        label: PHP
        source: "<?php\n$ch = curl_init(\"https://api.paylands.com/v1/sandbox/posms/payment\");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER,\
          \ true);\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"POST\");\ncurl_setopt($ch, CURLOPT_HTTPHEADER, [\n    \"Authorization:\
          \ Basic \" . base64_encode(\"<API_KEY>:\"),\n    \"Content-Type: application/json\"\n]);\ncurl_setopt($ch, CURLOPT_POSTFIELDS,\
          \ '{\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\",\n  \"\
          amount\": 100,\n  \"description\": \"Order\\'s description\",\n  \"customer_ext_id\": \"12345678A\",\n  \"additional\"\
          : \"Additional info\",\n  \"url_post\": \"https://mysite.com/payment/result\",\n  \"reference\": \"XXX1234ABC\"\n\
          }');\n\n$response = curl_exec($ch);\ncurl_close($ch);\necho $response;"
