        proceso delante de un navegador web. En algunos métodos de pago como Bizum, la llamada a este método enviará la notificación
        PUSH al teléfono móvil del usuario para que lleve a cabo el pago. En otros, devolverá la información necesaria para
        que se pueda llevar a cabo el pago.


        Si un servicio de pago soporta más de un APM (método alternativo de pago), deberá indicarse el APM a utilizar en el
        cuerpo de la petición.'
      x-description-i18n:
        eng: 'This method allows initiating alternative payments without the user having to be present during the process
          in front of a web browser. In some payment methods such as Bizum, the call to this method will send the PUSH notification
