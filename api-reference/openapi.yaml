      summary: Abono
      description: 'Transfiere fondos al `source_uuid` indicado del usuario. Para enviar dinero a una tarjeta, es necesario
        que ésta haya realizado alguna operación de cobro previa en el terminal. Si no se indica `source_uuid`, se seleccionará
        la última tarjeta que haya realizado un pago exitoso y esté asociada al `customer_ext_id` indicado al generar la orden.


        También existen otras formas de transferir fondos a un usuario. Algunos servicios soportan métodos de pago alternativos
        como Bizum, PIX o transferencias bancarias. Si se utiliza un servicio con más de una forma de transferir fondos, es
        obligatorio indicar el campo `apm` para especificar cuál de ellos se utilizará. Podrá encontrar más información al
        respecto de estos métodos de pago en la Documentación. No todos los APM soportan abonos.'
      x-description-i18n:
        eng: 'Transfers funds to the specified `source_uuid` of the customer. To send money to a card, it is necessary for
          the card to have carried out a previous payment in the terminal. If `source_uuid` is not provided, the last card
          that has made a successful payment and is associated with the `customer_ext_id` indicated when generating the order
          will be selected.


          There are also other ways to transfer funds to a customer. Some services support alternative payment methods such
          as Bizum, PIX or bank transfers. If a service with more than one way of transferring funds such as Redsys is used,
          it is mandatory to provide the `apm` field to specify which one will be used. You can find more information about
          these payment methods in the Documentation. Not all APM support payouts.'
      x-summary-i18n:
        eng: Payout
      x-codeSamples:
