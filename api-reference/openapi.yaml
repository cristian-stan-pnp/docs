          121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\",\n  \"source_uuid\"\
          : \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"127.0.0.1\",\n  \"apm\": \"BIZUM\"\n}'"
      - lang: python
        label: Python
        source: "import requests\n\nurl = \"https://api.paylands.com/v1/sandbox/payment/payout\"\nheaders = {\n    \"Authorization\"\
          : \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\n}\npayload = {\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\",\n  \"source_uuid\"\
          : \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"127.0.0.1\",\n  \"apm\": \"BIZUM\"\n}\n\nresponse\
          \ = requests.post(url, json=payload, headers=headers)\nprint(response.json())"
      - lang: javascript
        label: Node.js
        source: "const response = await fetch(\"https://api.paylands.com/v1/sandbox/payment/payout\", {\n  method: \"POST\"\
          ,\n  headers: {\n    \"Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\
          \n  },\n  body: JSON.stringify({\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\"\
          ,\n  \"source_uuid\": \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"127.0.0.1\",\n  \"apm\": \"\
          BIZUM\"\n})\n});\n\nconst data = await response.json();\nconsole.log(data);"
      - lang: php
        label: PHP
        source: "<?php\n$ch = curl_init(\"https://api.paylands.com/v1/sandbox/payment/payout\");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER,\
