      description: Tipo de cuenta bancaria.
      x-description-i18n:
        eng: Type of bank account.
    Antifraud:
      description: Información antifraude asociada a la transacción. Disponible solo en transacciones de pago.
      x-description-i18n:
        eng: Antifraud information associated to the transaction. Available only on payment transactions.
      properties:
        evaluation:
          $ref: '#/components/schemas/AntifraudEvaluation'
        fraud_score:
          type: number
          description: Umbral de fraude configurado en el antifraude del servicio. Si `score` es igual o lo supera, el pago
            será marcado como fraudulento y no se intentará cobrar.
          x-description-i18n:
            eng: Fraud threshold configured on the payment service. If `score` is equal or greater, the payment will be flagged
              as `"FRAUD"` and the payment will not go through.
        risk_score:
          type: number
          description: Umbral de riesgo configurado en el antifraude del servicio. Si `score` es igual o lo supera, el pago
            deberá finalizarse mediante 3D Secure obligatoriamente.
          x-description-i18n:
            eng: Risk threshold configured on the payment service. If `score` is equal or greater, the payment will be flagged
              as `"FRAUD"` and the payment will not go through.
        score:
          type: number
          description: Puntuación total de las reglas antifraude evaluadas.
          x-description-i18n:
            eng: Total score of all the configured antifraud rules.
        triggered_rules:
          $ref: '#/components/schemas/AntifraudRules'
      required:
      - evaluation
      - score
      - risk_score
      - fraud_score
      - triggered_rules
      type: object
