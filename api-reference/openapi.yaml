      summary: Guardar varias tarjetas de crédito/débito
      description: 'Mediante este endpoint se pueden almacenar varias tarjetas simultáneamente, las cuales podrán ser utilizadas
        posteriormente para realizar pagos mediante Webservice.


        Si se indica el campo `validate` a `true`, la tarjeta será validada contra el servicio indicado en el campo `service`
        para comprobar si existe y tiene fondos en el momento de la validación. Algunos servicios requieren que el campo `card_cvv`
        sea indicado.'
      x-description-i18n:
        eng: 'This endpoint can store multiple credit cards, which can be used in a WebService payments call.

          The `validate` and `service` fields are only necessary in case the card needs to be validated against the bank service.'
      x-summary-i18n:
        eng: Store multiple credit/debit cards
