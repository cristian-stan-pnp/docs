      description: 'Si se quiere integrar directamente Google Pay o Apple Pay, se puede proceder al pago indicando la orden
        a pagar y el Payload devuelto por cualquiera de estos wallet. Este flujo es necesario en pagos a través de APP ya
        que no es posible mostrar el botón de Google Pay o Apple Pay en un webview desde un dispositivo móvil.


        Si el wallet es Google Pay, es posible que sea necesario finalizar el cobro mediante 3DS. En este caso, la respuesta
        devuelta contendrá la URL a la que debe redirigirse al usuario para autenticarse y poder finalizar el cobro. Si el
        wallet es Apple Pay, la orden se considerará pagada como 3DS porque Apple Pay se considera un método de pago seguro.'
      x-description-i18n:
        eng: 'If you want to directly integrate Google Pay or Apple Pay, you can proceed with the payment indicating the order
          to pay and the Payload returned by any of these wallets. This flow is necessary in payments through an APP since
          it is not possible to show the Google Pay or Apple Pay button in a webview from a mobile device.


          If the wallet is Google Pay, it may be necessary to finalize the payment through 3DS. In this case, the response
          will contain the URL to which the user must be redirected to authenticate and complete the payment. If the wallet
          is Apple Pay, the order will be considered 3DS because Apple Pay is considered a secure payment method.'
      x-summary-i18n:
        eng: Payment by wallet
