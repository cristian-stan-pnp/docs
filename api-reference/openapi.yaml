      summary: Pago en un sólo paso
      description: 'Permite generar una orden de cobro, almacenar la tarjeta y realizar el pago en una sola petición. Sólo
        usable por clientes PCI.


        Si el pago es no seguro se realizará un pago directo. En caso de que el antifraude detecte riesgo, se devolverá un
        enlace para que el usuario finalice el pago tokenizado por 3DS, de lo contrario el pago finalizará normalmente.


        Si el pago es seguro se devolverá el enlace al pago tokenizado por 3DS para que el usuario finalice el pago de forma
        segura.'
      x-description-i18n:
        eng: 'This endpoint generates a payment order, stores the card and executes the payment on a single request. It is
          only usable if you are PCI compliant.


          If the payment is not secure, the order will be paid through a direct payment. In case the antifraud detects risk,
          a link will be returned in order for the customer to finalize the tokenized payment through 3D Secure. Otherwise
          the payment will finalize as usual.


          If the payment is secure, a link will be returned in order for the customer to finalize the tokenized payment through
          3D Secure.'
