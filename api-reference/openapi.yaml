      summary: Pago MoTo por API
      description: 'Este método permite realizar el pago de una orden con los datos de pago obtenidos mediante correo o teléfono.
        Esta operación no requerirá autenticación, ya que es una operación exenta de PSD2. Sólo usable por clientes PCI.


        En caso de tener activado el antifraude, las órdenes consideradas de riesgo se procesarán sin ninguna restricción
        adicional.


        Para llevar a cabo este pago será necesario indicar la tarjeta que se va a emplear. Hay dos formas para ello: indicando
        los datos de tarjeta por separado (`card_holder`, `card_pan`, `card_expire_month`, `card_expire_year`, y opcionalmente,
        con `card_cvv` y `card_additional`) o, si la tarjeta ya fue tokenizada previamente, indicando su uuid en el campo
        `source_uuid` únicamente.'
      x-description-i18n:
        eng: 'This method allows you to pay for an order with the payment data obtained by mail or telephone. This operation
          will not require authentication, as it is a PSD2-exempt operation. It is only usable if you are PCI compliant.


          If anti-fraud is activated, orders considered risky will be processed without any additional restrictions.


          To carry out this payment it will be necessary to indicate the card to be used. There are two ways to do this: indicating
          the card data separately (`card_holder`, `card_pan`, `card_expire_month`, `card_expire_year`, and optionally with
          `card_cvv` and `card_additional`) or, if the card is already tokenized, indicating its uuid in the `source_uuid`
          field only.'
      x-summary-i18n:
        eng: MoTo payment via API
      x-codeSamples:
      - lang: bash
        label: cURL
        source: "curl --request POST \\\n  --url https://api.paylands.com/v1/sandbox/payment/moto \\\n  --header 'Authorization:\
          \ Basic <base64(API_KEY:)>' \\\n  --header 'Content-Type: application/json' \\\n  --data '{\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\",\n  \"method\":\
          \ \"MAIL\",\n  \"card_holder\": \"John Doe\",\n  \"card_pan\": \"4111111111111111\",\n  \"card_expiry_month\": \"\
          12\",\n  \"card_expiry_year\": \"19\",\n  \"card_cvv\": \"123\",\n  \"card_additional\": \"card12345\"\n}'"
      - lang: python
        label: Python
        source: "import requests\n\nurl = \"https://api.paylands.com/v1/sandbox/payment/moto\"\nheaders = {\n    \"Authorization\"\
          : \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\n}\npayload = {\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\",\n  \"method\":\
          \ \"MAIL\",\n  \"card_holder\": \"John Doe\",\n  \"card_pan\": \"4111111111111111\",\n  \"card_expiry_month\": \"\
          12\",\n  \"card_expiry_year\": \"19\",\n  \"card_cvv\": \"123\",\n  \"card_additional\": \"card12345\"\n}\n\nresponse\
          \ = requests.post(url, json=payload, headers=headers)\nprint(response.json())"
      - lang: javascript
        label: Node.js
        source: "const response = await fetch(\"https://api.paylands.com/v1/sandbox/payment/moto\", {\n  method: \"POST\"\
          ,\n  headers: {\n    \"Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\
          \n  },\n  body: JSON.stringify({\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\"\
          ,\n  \"method\": \"MAIL\",\n  \"card_holder\": \"John Doe\",\n  \"card_pan\": \"4111111111111111\",\n  \"card_expiry_month\"\
          : \"12\",\n  \"card_expiry_year\": \"19\",\n  \"card_cvv\": \"123\",\n  \"card_additional\": \"card12345\"\n})\n\
          });\n\nconst data = await response.json();\nconsole.log(data);"
      - lang: php
        label: PHP
        source: "<?php\n$ch = curl_init(\"https://api.paylands.com/v1/sandbox/payment/moto\");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER,\
          \ true);\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"POST\");\ncurl_setopt($ch, CURLOPT_HTTPHEADER, [\n    \"Authorization:\
          \ Basic \" . base64_encode(\"<API_KEY>:\"),\n    \"Content-Type: application/json\"\n]);\ncurl_setopt($ch, CURLOPT_POSTFIELDS,\
          \ '{\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1f405ea3-9798-42a6-9e87-bd347ef67f55\"\
          ,\n  \"method\": \"MAIL\",\n  \"card_holder\": \"John Doe\",\n  \"card_pan\": \"4111111111111111\",\n  \"card_expiry_month\"\
          : \"12\",\n  \"card_expiry_year\": \"19\",\n  \"card_cvv\": \"123\",\n  \"card_additional\": \"card12345\"\n}');\n\
          \n$response = curl_exec($ch);\ncurl_close($ch);\necho $response;"
  /payment/moto/csv:
    post:
      operationId: create-moto-campaign
      tags:
      - Campañas MoTo
      - MoTo campaigns
      parameters:
      - $ref: '#/paths/~1/get/parameters/0'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Nombre interno identificativo de la campaña.
                  x-description-i18n:
                    eng: A short description about the campaign.
                expires_at:
                  type: string
                  description: Fecha a partir de la cual caducan los pagos de la campaña. Los pagos caducan a las 00:00:00
                    del día especificado.
                  x-description-i18n:
                    eng: Date after which the payments expire and can no longer be attempted. Payments expire at 00:00:00
                      on the provided date.
                file:
                  type: string
                  description: Fichero CSV codificado en base64 y encabezado por el texto 'data:text/csv;base64,'
                  x-description-i18n:
                    eng: 'CSV in base64, starting with the text: `data:text/csv;base64,`'
                filename:
                  type: string
                  description: Nombre del fichero .csv.
                  nullable: true
                  x-description-i18n:
                    eng: Name of the .csv file.
                service_uuid:
                  type: string
                  description: El UUID del servicio de pago empleado para llevar a cabo la operación.
                  x-description-i18n:
                    eng: The UUID of the payment service used to perform the operation.
                signature:
                  type: string
                  description: Firma que acompaña a la API key. Requerida en todas las peticiones POST/PUT/DELETE.
                  x-description-i18n:
                    eng: Signature paired with the API key. Required in all POST/PUT/DELETE requests.
                subject:
                  type: string
                  description: Asunto de la campaña, que será enviado si se indica email como método de envío. En el caso
                    de SMS se indicará el nombre del comercio con un máximo de 11 caracteres.
                  nullable: true
                  x-description-i18n:
                    eng: This value will be sent as subject if the `type` is "EMAIL". In the case of SMS, the name of the
                      merchant will be indicated with a maximum of 11 characters.
                type:
                  description: Método de envío de los pagos MoTo.
                  x-description-i18n:
                    eng: Delivery method of the MoTo payments.
                  enum:
                  - PHONE
                  - MAIL
                  - CUSTOM_DELIVERY
                  type: string
              example:
                description: Campaña de Navidad 2019
                expires_at: '2017-11-11'
                file: data:text/csv;base64,
