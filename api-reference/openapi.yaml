          \ with the Paylands Sentinel Service.\n\n\n      This operation can be performed using two communication protocols:\n\
          \n1. **HTTP Protocol**: For direct communication with the payment terminal via HTTP 2. **Intent Operation (Android)**:\
          \ For Android applications using intent-based communication\nThis documentation describes the parameters needed\
          \ to verify a card with APP2APP and the response structure."
