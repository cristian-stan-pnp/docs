  /posms/app2app:
    get:
      operationId: app2app-integration
      tags:
      - POSMS
      parameters:
      - name: Authorization
        in: header
        description: 'Bearer token for APP2APP HTTP protocol. Example: ''Bearer <your_token>'''
        required: true
        schema:
          type: string
          example: Bearer 97ed54e0adf46543b491365c27cb5290
      responses:
        '200':
          description: APP2APP Integration Documentation
          content:
            application/json:
              schema:
                type: object
              examples:
                response:
                  value:
                    message: OK
                    code: 200
                    current_time: 2025-05-28T12:00:00+0200
      summary: APP2APP Integration
      description: 'La integración APP2APP permite a su aplicación móvil comunicarse directamente con el servicio Sentinel
        de Paylands para procesar pagos a través de dispositivos físicos. Este enfoque es perfecto para negocios que ya tienen
        aplicaciones móviles y desean añadir capacidades de pago sin implementar toda la lógica de comunicación con el dispositivo.


        Existen dos protocolos de comunicación principales:

        1. **Protocolo HTTP**: Para comunicación directa con el terminal de pago mediante llamadas HTTP a http://<Dirección>:6889/sentinel

        2. **Operación Intent (Android)**: Para aplicaciones Android que utilizan comunicación basada en intents con el formato
        URI: com.paynopain.sentinel://<Método>?<Datos>


        Operaciones disponibles:

        - [Pago](/posms/app2app/payment): Procesa un pago a través de un dispositivo físico

        - [Devolución](/posms/app2app/refund): Procesa una devolución a una tarjeta previamente cobrada

        - [GetTransaction](/posms/app2app/transaction): Obtiene información sobre una transacción específica

        - [Card Verify](/posms/app2app/card-verify): Verifica una tarjeta sin procesar un pago


        Para obtener documentación completa sobre cada operación, consulte las secciones específicas de este documento o utilice
        los enlaces de operación proporcionados.'
      x-description-i18n:
        eng: 'The APP2APP integration allows your mobile application to communicate directly with the Paylands Sentinel Service
          for processing payments through physical devices. This approach is perfect for businesses with existing mobile applications
          that want to integrate payment capabilities without implementing all the low-level device communication logic.


          There are two main communication protocols:

          1. **HTTP Protocol**: For direct HTTP communication with the payment terminal at http://<Address>:6889/sentinel

          2. **Intent Operation (Android)**: For Android applications using intent-based communication with URI format: com.paynopain.sentinel://<Method>?<Data>


          Available operations:

          - [Payment](/posms/app2app/payment): Process a payment through a physical device

          - [Refund](/posms/app2app/refund): Process a refund to a previously charged card

          - [GetTransaction](/posms/app2app/transaction): Retrieve information about a specific transaction

          - [Card Verify](/posms/app2app/card-verify): Verify a card without processing a payment

          For comprehensive documentation on each operation, see the specific sections of this document or use the operation
          links provided.'
      x-summary-i18n:
        eng: APP2APP Integration
  /posms/app2app/payment:
    post:
      operationId: app2app-payment
      tags:
      - POSMS - APP2APP
      parameters:
      - $ref: '#/paths/~1posms~1app2app/get/parameters/0'
      responses:
        '200':
          description: APP2APP Payment Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    type: string
                    description: Device identifier
                    example: '352019330429196'
                  transaction_id:
                    type: string
                    description: Unique transaction ID
                    example: e1d7a4b1-2a8a-43e6-be62-001154f0d2f4
                  aid:
                    type: string
                    description: Application identifier
                    example: A0000000041010
                  amount:
                    type: integer
                    description: Transaction amount (in cents)
                    example: 100
                  currency:
                    type: string
                    description: Currency code
                    example: '978'
                  auth_code:
                    type: string
                    description: Authorization code
                    example: '247687'
                  brand:
                    type: string
                    description: Card brand
                    example: MASTERCARD
                  pan:
                    type: string
                    description: Masked card number
                    example: 480033******0348
                  panExpiryDate:
                    type: string
                    description: Card expiry date (MM/YY)
                    example: 12/26
                  reversal:
                    type: boolean
                    description: Whether this is a reversal transaction
                    example: false
                  date_terminal:
                    type: string
                    description: Terminal date
                    example: Apr 26, 2022 13:44:29
                  date_server:
                    type: string
                    description: Server date
                    example: Apr 26, 2022 14:37:46
                  emv_response:
