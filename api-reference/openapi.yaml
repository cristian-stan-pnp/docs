  /customer/{customer_ext_id}/banks:
    get:
      operationId: list-customer-banks
      tags:
      - Cuentas bancarias
      - Bank accounts
      parameters:
      - $ref: '#/paths/~1/get/parameters/0'
      - name: customer_ext_id
        in: path
        required: true
        example: 123fd2
        schema:
          type: string
        description: ID externo otorgado por el comercio para identificar de forma única a un usuario.
        x-description-i18n:
          eng: External ID provided by the merchant to uniquely identify a customer.
      - name: status
        in: query
        required: false
        example: VALIDATED
        schema:
          type: string
        description: 'Especifica qué cuentas bancarias se obtendrán. Admite dos posibles valores:


          - `VALIDATED` - Sólo devolverá aquellas cuentas bancarias que se validaron correctamente cuando se guardaron o que
          se han podido utilizar en un pago correcto. Este es el valor por defecto.


          - `ALL` - Devolverá todas las cuentas bancarias, tanto las validadas por el banco como las no validadas.'
        x-description-i18n:
          eng: 'Selects which bank accounts will be returned. Two values are allowed:


            - `VALIDATED` - Only validated bank accounts will be returned. Validated bank accounts are those that were checked
            against bank service when user stored them or those that haven been used in a successful payment. This is the
            value by default.


            - `ALL` - All customer bank accounts will be returned, both validated and unvalidated.'
      - name: unique
        in: query
        required: false
        example: 'false'
        schema:
          type: string
        description: 'Cuando se realiza una operación en Paylands, se asocia a una cuenta bancaria del usuario. Si se utiliza
          esta cuenta bancaria en otra operación, se crea otra entrada en el sistema. A la hora de obtener las cuentas bancarias,
          este parámetro indica si se necesita obtenerlas todas con repetición (si se han usado en más de un pago) o sin repetición.
          Obtener las repetidas es útil para saber cuantas veces se ha usado una cuenta bancaria. Sin embargo, si lo que se
          necesita es mostrarlas en un desplegable al usuario, se recomienda obtenerlas sin repetición. Admite dos posibles
          valores booleanos:


          - `true` - Sólo devolverá una ocurrencia por cuenta bancaria.


          - `false` - Devolverá una cuenta bancaria por pago. Si una cuenta bancaria se ha usado en N pagos, aparecerá N veces
          en el json de respuesta. Este es el valor por defecto.'
        x-description-i18n:
          eng: 'When a payment is done within Paylands, it is associated to a customer card. If this card is used in another
            payment, another entry for this card is created. When fetching bank accounts, the unique parameter decides whether
            repeated bank accounts need to be returned. Obtaining repeated bank accounts is useful to know how many times
            a card has been used. Retrieving them without repetition is useful when the purpose is to populate a dropdown
            to the user, where only different bank accounts need to be shown. Two boolean values are allowed:


            - `true` - No repetition. One occurrence per card will be returned.


            - `false` - Bank accounts may be returned with repetition. This is the value by default.'
