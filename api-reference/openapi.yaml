      summary: Devolución
      description: 'Este endpoint se utiliza para devolver un importe a la tarjeta con la que se hizo el pago. Si no se envía
        el campo `amount`, la devolución será total.

        Si se envía este campo, la devolución será del importe enviado (siempre y cuando sea válido).


        Cuando la devolución se haga a través de un marketplace. Se debe incluir el campo `extra_data`, indicando dentro `marketplace_refunds`y
        los datos pertinentes a cada comercio y el importe devuelto por cada uno.


        En el campo `amount`, del comercio que efectúa la devolución, será igual al `amount` indicado fuera del `extra_data`
        y en el `net_amount` se indicará el importe que devolverá cada una de las partes involucradas en la devolución.


        Si un intento de devolución falla, se deberá esperar 1 minuto desde el último intento fallido antes de realizar un
        nuevo intento. En caso de que una devolución sea exitosa, no será necesario esperar para realizar otro intento de
        devolución. Sin embargo, si el sistema detecta 3 intentos fallidos en total, no se permitirán más intentos hasta el
        inicio del próximo día.


        A partir del tercer intento fallido, solo se permitirá un devolución fallida al día. Esto significa que después de
        los tres primeros reintentos fallidos, si el siguiente también falla, deberá esperar hasta el siguiente día para realizar
        otro intento.'
      x-description-i18n:
        eng: 'Using this endpoint, a refund into the source card is requested. If the `amount` field is not sent, it will
          be a full refund. Otherwise, the refund will be requested for the specified amount (in case it''''s valid).


          When the refund is made by a marketplace. The `extra_data` field must be included, indicating within `marketplace_refunds`
          and the data pertinent to each merchant and the amount refunded by each one.


          In the `amount` field, of the merchant that makes the refund, will be equal to the `amount` indicated outside of
          the `extra_data` and the `net_amount` will indicate the amount that will be refunded by each of the parties involved
          in the refund.


          If a refund attempt fails, you must wait 1 minute from the last unsuccessful attempt before making a new attempt.
          In the event of a successful refund, it will not be necessary to wait for another refund attempt to be made. However,
          if the system detects 3 failed attempts in total, no further attempts will be allowed until the start of the next
          day.


          From the third unsuccessful attempt onwards, only one unsuccessful return will be allowed per day. This means that
          after the first three failed retries, if the next one also fails, you will have to wait until the next day to make
          another attempt.'
      x-summary-i18n:
        eng: Refund
      x-codeSamples:
      - lang: bash
        label: cURL
