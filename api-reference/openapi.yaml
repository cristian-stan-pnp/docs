          \    \"Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\n}\npayload =\
          \ {\n  \"transactionId\": \"8171185d-417f-4e74-a678-b86912022cfc\"\n}\n\nresponse = requests.post(url, json=payload,\
          \ headers=headers)\nprint(response.json())"
      - lang: javascript
