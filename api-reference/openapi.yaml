      summary: Enviar cancelación
      description: Este endpoint permite enviar una cancelación de una pre-autorización a un dispositivo elegido.
      x-description-i18n:
        eng: This endpoint allows the merchant to send a cancellation of a pre-authorization to the chosen physical device.
      x-summary-i18n:
        eng: Send cancellation
      x-codeSamples:
      - lang: bash
        label: cURL
        source: "curl --request POST \\\n  --url https://api.paylands.com/v1/sandbox/posms/preauth/cancel \\\n  --header 'Authorization:\
          \ Basic <base64(API_KEY:)>' \\\n  --header 'Content-Type: application/json' \\\n  --data '{\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\",\n  \"order_uuid\": \"4DE116C9-0064-4BCA-A5D0-1D69A8E972FD\"\
          \n}'"
      - lang: python
        label: Python
        source: "import requests\n\nurl = \"https://api.paylands.com/v1/sandbox/posms/preauth/cancel\"\nheaders = {\n    \"\
          Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\n}\npayload = {\n  \"\
          signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\",\n  \"order_uuid\"\
          : \"4DE116C9-0064-4BCA-A5D0-1D69A8E972FD\"\n}\n\nresponse = requests.post(url, json=payload, headers=headers)\n\
          print(response.json())"
      - lang: javascript
        label: Node.js
        source: "const response = await fetch(\"https://api.paylands.com/v1/sandbox/posms/preauth/cancel\", {\n  method: \"\
          POST\",\n  headers: {\n    \"Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\
          \n  },\n  body: JSON.stringify({\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\"\
          ,\n  \"order_uuid\": \"4DE116C9-0064-4BCA-A5D0-1D69A8E972FD\"\n})\n});\n\nconst data = await response.json();\n\
          console.log(data);"
      - lang: php
        label: PHP
        source: "<?php\n$ch = curl_init(\"https://api.paylands.com/v1/sandbox/posms/preauth/cancel\");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER,\
          \ true);\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"POST\");\ncurl_setopt($ch, CURLOPT_HTTPHEADER, [\n    \"Authorization:\
          \ Basic \" . base64_encode(\"<API_KEY>:\"),\n    \"Content-Type: application/json\"\n]);\ncurl_setopt($ch, CURLOPT_POSTFIELDS,\
          \ '{\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"device\": \"611629d29a5b401507c11f7e\",\n  \"\
          order_uuid\": \"4DE116C9-0064-4BCA-A5D0-1D69A8E972FD\"\n}');\n\n$response = curl_exec($ch);\ncurl_close($ch);\n\
          echo $response;"
