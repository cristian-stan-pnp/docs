      summary: Por WebService
      description: 'En este método de pago no interviene el usuario. Para ello se necesita el uuid de la orden de pago y el
        uuid de una tarjeta previamente almacenada en el sistema.


        Si el comercio tiene el sistema antifraude activado, podría darse el caso que alguna regla se activase y fuese necesario
        finalizar el cobro por 3DS. En este caso, la respuesta devuelta contendrá la URL a la que debe redirigirse al usuario
        para autenticarse y poder finalizar el cobro.


        Bajo ningún concepto debe modificarse esta URL, puesto que su formato puede variar en futuras actualizaciones. Su
        uso se restringe a obtenerla del cuerpo de la petición y redirigir al usuario.


        La IP del usuario que solicita el pago debe indicarse en formato IPv4 o IPv6. Si no se indica, no se podrán ejecutar
        medidas antifraude relacionadas con la IP.'
      x-description-i18n:
        eng: 'User intervention is not required when using this method. It will be necessary to provide the payment order
          UUID and the card''s UUID which will have ben previously stored.


          If antifraud system is enabled, some rules could be triggered and it would be necessary user authentication (3DS)
          to finish the payment. In this case, response will contain the URL the user must be redirected to in order to authenticate
          himself and complete the payment.


          This URL must not be changed under any circumstances, as its syntax may change on future releases. It should only
          be retrieved from response''s body and used to redirect the user.


          The IP address of the customer that is about to pay must be included in IPv4 or IPv6 format. Otherwise, antifraud
          measures related to the customer''s IP won''t be executed.'
      x-summary-i18n:
        eng: WebService
      x-codeSamples:
      - lang: bash
        label: cURL
        source: "curl --request POST \\\n  --url https://api.paylands.com/v1/sandbox/payment/direct \\\n  --header 'Authorization:\
          \ Basic <base64(API_KEY:)>' \\\n  --header 'Content-Type: application/json' \\\n  --data '{\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1F405EA3-9798-42A6-9E87-BD347EF67F55\",\n  \"card_uuid\"\
          : \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"62.43.214.55\"\n}'"
      - lang: python
        label: Python
        source: "import requests\n\nurl = \"https://api.paylands.com/v1/sandbox/payment/direct\"\nheaders = {\n    \"Authorization\"\
          : \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\n}\npayload = {\n  \"signature\": \"\
          121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1F405EA3-9798-42A6-9E87-BD347EF67F55\",\n  \"card_uuid\"\
          : \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"62.43.214.55\"\n}\n\nresponse = requests.post(url,\
          \ json=payload, headers=headers)\nprint(response.json())"
      - lang: javascript
        label: Node.js
        source: "const response = await fetch(\"https://api.paylands.com/v1/sandbox/payment/direct\", {\n  method: \"POST\"\
          ,\n  headers: {\n    \"Authorization\": \"Basic <base64(API_KEY:)>\",\n    \"Content-Type\": \"application/json\"\
          \n  },\n  body: JSON.stringify({\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1F405EA3-9798-42A6-9E87-BD347EF67F55\"\
          ,\n  \"card_uuid\": \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"62.43.214.55\"\n})\n});\n\n\
          const data = await response.json();\nconsole.log(data);"
      - lang: php
        label: PHP
        source: "<?php\n$ch = curl_init(\"https://api.paylands.com/v1/sandbox/payment/direct\");\ncurl_setopt($ch, CURLOPT_RETURNTRANSFER,\
          \ true);\ncurl_setopt($ch, CURLOPT_CUSTOMREQUEST, \"POST\");\ncurl_setopt($ch, CURLOPT_HTTPHEADER, [\n    \"Authorization:\
          \ Basic \" . base64_encode(\"<API_KEY>:\"),\n    \"Content-Type: application/json\"\n]);\ncurl_setopt($ch, CURLOPT_POSTFIELDS,\
          \ '{\n  \"signature\": \"121149a0ba5361191d740fa898784a8b\",\n  \"order_uuid\": \"1F405EA3-9798-42A6-9E87-BD347EF67F55\"\
          ,\n  \"card_uuid\": \"C10721E7-1404-45DC-8762-351DD9945D1D\",\n  \"customer_ip\": \"62.43.214.55\"\n}');\n\n$response\
          \ = curl_exec($ch);\ncurl_close($ch);\necho $response;"
  /payment/moto:
    post:
      operationId: api-moto-payment
      tags:
      - Pagos
      - Payments
      parameters:
      - $ref: '#/paths/~1/get/parameters/0'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                signature:
                  type: string
                  description: Firma que acompaña a la API key. Requerida en todas las peticiones POST/PUT/DELETE.
                  x-description-i18n:
                    eng: Signature paired with the API key. Required in all POST/PUT/DELETE requests.
                order_uuid:
                  type: string
                  description: Identificador único de la orden.
                  example: 455C87FF-8DAC-478F-A83C-47CB4581BC2A
                  x-description-i18n:
                    eng: Unique identifier of the order.
                method:
                  description: Origen de los datos de tarjeta (llamada telefónica o por correo).
                  x-description-i18n:
                    eng: Origin of the card details (phone call or through mail).
                  enum:
                  - MAIL
                  - PHONE
                  type: string
                card_holder:
                  type: string
                  description: Titular de la tarjeta.
                  x-description-i18n:
                    eng: Cardholder name.
                card_pan:
                  type: string
                  example: 411111******1111
                  description: Número de la tarjeta.
                  x-description-i18n:
                    eng: Primary account number (PAN).
                card_expiry_month:
                  type: string
                  example: '10'
                  description: Mes de expiración de la tarjeta.
                  x-description-i18n:
                    eng: Expiry month of the card.
                card_expiry_year:
                  type: string
                  example: '24'
                  description: Año de expiración de la tarjeta.
                  x-description-i18n:
                    eng: Expiry year of the card.
                card_cvv:
                  type: string
                  example: '123'
                  description: Número de verificación que aparece normalmente en el reverso de la tarjeta.
                  x-description-i18n:
                    eng: Card Verification Value (CVV) usually displayed on the back of the card.
                card_additional:
                  type: string
                  description: Descripción que se asociará a la tarjeta.
                  x-description-i18n:
                    eng: Description that will be assigned to the card.
                source_uuid:
                  type: string
                  description: Identificador único del medio de pago empleado para realizar el pago.
                  x-description-i18n:
                    eng: Unique identifier of the payment method used to perform the payment.
              example:
                signature: 121149a0ba5361191d740fa898784a8b
                order_uuid: 1f405ea3-9798-42a6-9e87-bd347ef67f55
                method: MAIL
                card_holder: John Doe
                card_pan: '4111111111111111'
                card_expiry_month: '12'
                card_expiry_year: '19'
                card_cvv: '123'
                card_additional: card12345
              required:
              - signature
              - order_uuid
              - method
      responses:
        '200':
          content:
            application/json:
              examples:
                response:
                  value:
