      summary: Cancelación
      description: 'Mediante esta operativa se libera el saldo retenido por una operación DEFERRED.


        Si un intento de cancelación falla, se deberá esperar 1 minuto desde el último intento fallido antes de realizar un
        nuevo intento. En caso de que una cancelación sea exitosa, no será necesario esperar para realizar otro intento de
        cancelación. Sin embargo, si el sistema detecta 3 intentos fallidos en total, no se permitirán más intentos hasta
        el inicio del próximo día.


        A partir del tercer intento fallido, solo se permitirá un cancelación fallida al día. Esto significa que después de
        los tres primeros reintentos fallidos, si el siguiente también falla, deberá esperar hasta el siguiente día para realizar
        otro intento.'
      x-description-i18n:
        eng: 'This endpoint frees the balance being held by a DEFERRED operative.


          If a cancellation attempt fails, you must wait 1 minute from the last unsuccessful attempt before making a new attempt.
          In case of a successful cancellation, it is not necessary to wait for another cancellation attempt. However, if
          the system detects 3 failed attempts in total, no further attempts will be allowed until the start of the next day.


          From the third unsuccessful attempt onwards, only one unsuccessful cancellation will be allowed per day. This means
          that after the first three failed retries, if the next one also fails, you will have to wait until the next day
          to make another attempt.'
      x-summary-i18n:
        eng: Cancellation
